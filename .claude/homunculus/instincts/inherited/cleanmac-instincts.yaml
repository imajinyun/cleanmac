# Cleanmac Workflow Migrate Unittest To Pytest

## Action

Follow the migrate-unittest-to-pytest workflow:
1. Identify target test modules using unittest.TestCase or similar wrappers.
2. Refactor test files in tests/ to use pytest-native functions, assertions, and fixtures (e.g., tmp_path, pytest.raises, parametrize).
3. Update Makefile to include migrated tests in relevant pytest targets (e.g., pytest-governance-smoke, ai-robustness-smoke, pytest-test).
4. Add or update implementation/governance plan documents in docs/superpowers/plans/ to record the migration.
5. Validate migration by running pytest targets and ensuring all tests pass.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~6x per month
- Files: tests/test_*.py, Makefile, docs/superpowers/plans/2026-06-24-pytest-*.md

