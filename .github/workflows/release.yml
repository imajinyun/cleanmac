name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    environment: release
    env:
      PYTHON: .venv/bin/python
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned from actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pinned from actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install build dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev,build]'

      - name: Run release quality gates
        run: make local-test build-check package-smoke script-smoke bundle-audit-smoke macos-smoke security-smoke dependency-audit-smoke docs-smoke governance-smoke open-source-smoke distribution-smoke release-artifacts-smoke

      - name: Build distributions
        run: $PYTHON -m build --wheel --sdist --outdir dist

      - name: Generate SHA256SUMS
        run: |
          mkdir -p release-assets
          $PYTHON scripts/generate_sbom.py --output release-assets/SBOM.json
          $PYTHON - <<'PY'
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          release_assets = Path("release-assets")
          lines = []
          for path in sorted(dist.iterdir()):
              if path.is_file():
                  lines.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}")
          sbom = release_assets / "SBOM.json"
          lines.append(f"{hashlib.sha256(sbom.read_bytes()).hexdigest()}  {sbom.name}")
          Path("release-assets/SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Verify installation from wheel
        run: |
          python -m venv /tmp/cleanmac-release-verify
          /tmp/cleanmac-release-verify/bin/python -m pip install dist/cleanmac-*.whl
          /tmp/cleanmac-release-verify/bin/cleanmac --json capabilities | $PYTHON -m json.tool >/dev/null

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # pinned from actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
            release-assets/SBOM.json
            release-assets/SHA256SUMS

      - name: Upload release artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # pinned from softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*
            release-assets/SBOM.json
            release-assets/SHA256SUMS

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pinned from pypa/gh-action-pypi-publish@release/v1
        if: startsWith(github.ref, 'refs/tags/')
