name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      PYTHON: .venv/bin/python
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pinned from actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned from actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Create venv and install build dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev,build]'

      - name: Run release quality gates
        run: make local-test build-check package-smoke script-smoke bundle-audit-smoke macos-smoke security-smoke dependency-audit-smoke docs-smoke governance-smoke ai-governance-smoke ai-contract-smoke governed-execution-smoke open-source-smoke mcp-smoke ai-host-smoke distribution-smoke homebrew-formula-smoke release-artifacts-smoke release-readiness-contract-smoke

      - name: Build distributions
        run: $PYTHON -m build --wheel --sdist --outdir dist

      - name: Generate release manifest and SHA256SUMS
        run: |
          mkdir -p release-assets
          $PYTHON scripts/generate_sbom.py --output release-assets/SBOM.json
          version="$($PYTHON - <<'PY'
          from pathlib import Path

          for line in Path("pyproject.toml").read_text(encoding="utf-8").splitlines():
              stripped = line.strip()
              if stripped.startswith("version = "):
                  print(stripped.split("=", 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit("Unable to find project version in pyproject.toml")
          PY
          )"
          tag_name="${GITHUB_REF_NAME}"
          if [ "${tag_name#v}" = "$tag_name" ]; then
            tag_name="v${version}"
          fi
          archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag_name}.tar.gz"
          curl -L --fail --retry 3 "$archive_url" -o /tmp/cleanmac-homebrew-source.tar.gz
          archive_sha256="$($PYTHON - <<'PY'
          import hashlib
          from pathlib import Path

          print(hashlib.sha256(Path("/tmp/cleanmac-homebrew-source.tar.gz").read_bytes()).hexdigest())
          PY
          )"
          $PYTHON scripts/generate_homebrew_formula.py --version "$version" --archive-url "$archive_url" --sha256 "$archive_sha256" --output release-assets/cleanmac.rb
          $PYTHON scripts/generate_release_manifest.py --dist-dir dist --assets-dir release-assets
          $PYTHON -c 'import json, pathlib; manifest=json.loads(pathlib.Path("release-assets/ARTIFACT-MANIFEST.json").read_text(encoding="utf-8")); assert manifest["schema"] == "cleanmac.release-artifact-manifest.v1"; assert manifest["distribution_policy"]["homebrew_formula"] == "tap-publishable"; assert manifest["distribution_policy"]["homebrew_tap"] == "cleanmac/tap"; assert manifest["distribution_policy"]["publish_after_cross_platform_verification"]; assert any(row["name"] == "cleanmac.rb" and row["kind"] == "homebrew-formula" for row in manifest["artifacts"])'

      - name: Verify release readiness
        run: |
          $PYTHON cleanmac.py --json release-readiness --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-READINESS.json
          $PYTHON cleanmac.py --json release-diagnostics --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-DIAGNOSTICS.json
          $PYTHON cleanmac.py --json release-rehearsal --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-REHEARSAL.json
          $PYTHON cleanmac.py --json release-rollback-plan --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-ROLLBACK-PLAN.json
          $PYTHON cleanmac.py --json release-post-publish-verification --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-POST-PUBLISH-VERIFICATION.json
          $PYTHON cleanmac.py --json release-promotion-decision --dist-dir dist --assets-dir release-assets > release-assets/RELEASE-PROMOTION-DECISION.json
          $PYTHON scripts/generate_release_manifest.py --dist-dir dist --assets-dir release-assets --evidence > /tmp/cleanmac-release-evidence.json
          $PYTHON -c 'import json, pathlib; report=json.loads(pathlib.Path("release-assets/RELEASE-READINESS.json").read_text(encoding="utf-8")); assert report["schema"] == "cleanmac.release-readiness.v1"; assert report["ready"] is True, report; assert report["failed_gate_ids"] == [], report'
          $PYTHON -c 'import json, pathlib; decision=json.loads(pathlib.Path("release-assets/RELEASE-PROMOTION-DECISION.json").read_text(encoding="utf-8")); assert decision["schema"] == "cleanmac.release-promotion-decision.v1"; assert decision["decision"] == "promote", decision; assert decision["safe_to_publish"] is True, decision'
          $PYTHON -c 'import json, pathlib; evidence=json.loads(pathlib.Path("release-assets/RELEASE-EVIDENCE.json").read_text(encoding="utf-8")); assert evidence["schema"] == "cleanmac.release-evidence.v1"; assert evidence["ready"] is True, evidence'

      - name: Verify installation from wheel on build runner
        run: |
          python -m venv /tmp/cleanmac-release-verify
          /tmp/cleanmac-release-verify/bin/python -m pip install dist/cleanmac-*.whl
          /tmp/cleanmac-release-verify/bin/cleanmac --json capabilities | $PYTHON -m json.tool >/dev/null

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned from actions/upload-artifact@v7.0.1
        with:
          name: cleanmac-dist
          path: dist/*

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned from actions/upload-artifact@v7.0.1
        with:
          name: cleanmac-release-assets
          path: release-assets/*

  verify-release-artifacts:
    name: Verify release artifacts (${{ matrix.os }})
    needs: build
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15]
    env:
      PYTHON: .venv/bin/python
      CLEANMAC_TEST_MODE: "1"
      CLEANMAC_TEST_NO_AUTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pinned from actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned from actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Download built distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # pinned from actions/download-artifact@v7
        with:
          name: cleanmac-dist
          path: dist

      - name: Download release metadata
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # pinned from actions/download-artifact@v7
        with:
          name: cleanmac-release-assets
          path: release-assets

      - name: Verify wheel install and release checksums
        run: |
          python -m venv .venv
          $PYTHON -m pip install --upgrade pip
          $PYTHON -m pip install dist/cleanmac-*.whl
          .venv/bin/cleanmac --json capabilities | $PYTHON -m json.tool >/dev/null
          $PYTHON - <<'PY'
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          assets = Path("release-assets")
          for line in (assets / "SHA256SUMS").read_text(encoding="utf-8").splitlines():
              digest, name = line.split(None, 1)
              name = name.strip()
              base = assets if name in {"SBOM.json", "cleanmac.rb"} else dist
              assert hashlib.sha256((base / name).read_bytes()).hexdigest() == digest
          assert (assets / "ARTIFACT-MANIFEST.json").is_file()
          assert (assets / "cleanmac.rb").is_file()
          PY

      - name: Verify governed release evidence
        run: |
          $PYTHON - <<'PY'
          import json
          from pathlib import Path

          assets = Path("release-assets")
          expected_schemas = {
              "RELEASE-READINESS.json": "cleanmac.release-readiness.v1",
              "RELEASE-DIAGNOSTICS.json": "cleanmac.release-diagnostics.v1",
              "RELEASE-EVIDENCE.json": "cleanmac.release-evidence.v1",
              "RELEASE-REHEARSAL.json": "cleanmac.release-rehearsal.v1",
              "RELEASE-PROMOTION-DECISION.json": "cleanmac.release-promotion-decision.v1",
              "RELEASE-ROLLBACK-PLAN.json": "cleanmac.release-rollback-plan.v1",
              "RELEASE-POST-PUBLISH-VERIFICATION.json": "cleanmac.release-post-publish-verification.v1",
          }
          payloads = {}
          for name, schema in expected_schemas.items():
              path = assets / name
              assert path.is_file(), f"Missing governed release evidence: {name}"
              payload = json.loads(path.read_text(encoding="utf-8"))
              assert payload["schema"] == schema, payload
              payloads[name] = payload
          assert payloads["RELEASE-READINESS.json"]["ready"] is True, payloads["RELEASE-READINESS.json"]
          assert payloads["RELEASE-EVIDENCE.json"]["ready"] is True, payloads["RELEASE-EVIDENCE.json"]
          assert payloads["RELEASE-REHEARSAL.json"]["ready"] is True, payloads["RELEASE-REHEARSAL.json"]
          decision = payloads["RELEASE-PROMOTION-DECISION.json"]
          assert decision["decision"] == "promote", decision
          assert decision["safe_to_publish"] is True, decision
          rollback = payloads["RELEASE-ROLLBACK-PLAN.json"]
          assert rollback["manual_only"] is True, rollback
          assert {"pypi", "github-release", "homebrew-tap"}.issubset(
              {surface["id"] for surface in rollback["rollback_surfaces"]}
          ), rollback
          post_publish = payloads["RELEASE-POST-PUBLISH-VERIFICATION.json"]
          assert post_publish["manual_only"] is True, post_publish
          assert {"pypi", "github-release", "homebrew-tap"}.issubset(
              {surface["id"] for surface in post_publish["verification_surfaces"]}
          ), post_publish
          PY

      - name: Run real macOS smoke against release candidate
        if: startsWith(matrix.os, 'macos')
        run: make real-macos-smoke

  publish:
    name: Attest and publish release artifacts
    needs: verify-release-artifacts
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # pinned from actions/download-artifact@v7
        with:
          name: cleanmac-dist
          path: dist

      - name: Download release metadata
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # pinned from actions/download-artifact@v7
        with:
          name: cleanmac-release-assets
          path: release-assets

      - name: Verify governed release promotion decision
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          assets = Path("release-assets")
          evidence = json.loads((assets / "RELEASE-EVIDENCE.json").read_text(encoding="utf-8"))
          decision = json.loads((assets / "RELEASE-PROMOTION-DECISION.json").read_text(encoding="utf-8"))
          rollback = json.loads((assets / "RELEASE-ROLLBACK-PLAN.json").read_text(encoding="utf-8"))
          post_publish = json.loads((assets / "RELEASE-POST-PUBLISH-VERIFICATION.json").read_text(encoding="utf-8"))
          assert evidence["schema"] == "cleanmac.release-evidence.v1", evidence
          assert evidence["ready"] is True, evidence
          assert decision["schema"] == "cleanmac.release-promotion-decision.v1", decision
          assert decision["decision"] == "promote", decision
          assert decision["safe_to_publish"] is True, decision
          assert decision["manual_review_required"] is False, decision
          assert rollback["schema"] == "cleanmac.release-rollback-plan.v1", rollback
          assert rollback["manual_only"] is True, rollback
          assert post_publish["schema"] == "cleanmac.release-post-publish-verification.v1", post_publish
          assert post_publish["manual_only"] is True, post_publish
          PY

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # pinned from actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
            release-assets/SBOM.json
            release-assets/SHA256SUMS
            release-assets/ARTIFACT-MANIFEST.json
            release-assets/RELEASE-READINESS.json
            release-assets/RELEASE-DIAGNOSTICS.json
            release-assets/RELEASE-EVIDENCE.json
            release-assets/RELEASE-REHEARSAL.json
            release-assets/RELEASE-PROMOTION-DECISION.json
            release-assets/RELEASE-ROLLBACK-PLAN.json
            release-assets/RELEASE-POST-PUBLISH-VERIFICATION.json
            release-assets/cleanmac.rb

      - name: Upload release artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # pinned from softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*
            release-assets/SBOM.json
            release-assets/SHA256SUMS
            release-assets/ARTIFACT-MANIFEST.json
            release-assets/RELEASE-READINESS.json
            release-assets/RELEASE-DIAGNOSTICS.json
            release-assets/RELEASE-EVIDENCE.json
            release-assets/RELEASE-REHEARSAL.json
            release-assets/RELEASE-PROMOTION-DECISION.json
            release-assets/RELEASE-ROLLBACK-PLAN.json
            release-assets/RELEASE-POST-PUBLISH-VERIFICATION.json
            release-assets/cleanmac.rb

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pinned from pypa/gh-action-pypi-publish@release/v1
        if: startsWith(github.ref, 'refs/tags/')

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          HOMEBREW_TAP_REPOSITORY: imajinyun/homebrew-tap
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update the Homebrew tap." >&2
            exit 1
          fi
          version="${TAG_NAME#v}"
          formula_url="https://github.com/${RELEASE_REPOSITORY}/releases/download/${TAG_NAME}/cleanmac.rb"
          gh api "repos/${HOMEBREW_TAP_REPOSITORY}/dispatches" \
            --method POST \
            -f event_type=cleanmac_release \
            -F client_payload[version]="$version" \
            -F client_payload[tag]="$TAG_NAME" \
            -F client_payload[formula_url]="$formula_url"
