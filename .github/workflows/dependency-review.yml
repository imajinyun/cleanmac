name: Dependency Review
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned from actions/checkout@v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@5a2ce3f5b92ee19cbb1548a4984c76d921e32efc # pinned from actions/dependency-review-action@v4
        with:
          fail-on-severity: high