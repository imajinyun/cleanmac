name: Dependency Review
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pinned from actions/checkout@v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@5a2ce3f5b92ee19cbb1548a4984c76d921e32efc # pinned from actions/dependency-review-action@v4
        with:
          fail-on-severity: high