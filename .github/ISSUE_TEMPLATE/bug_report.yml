name: Bug report
description: Report a reproducible cleanmac bug
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include credentials, private paths, or sensitive logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the exact command and a minimal safe sandbox reproduction when possible.
      placeholder: |
        1. Run `python3 cleanmac.py --json ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: destructive
    attributes:
      label: Did this involve destructive execution?
      options:
        - "No, dry-run only"
        - "Yes, with --execute"
        - "Yes, with --execute and --allow-live-root"
    validations:
      required: true
